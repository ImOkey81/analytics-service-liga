services:
  analytics-postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: analytics
      POSTGRES_USER: analytics
      POSTGRES_PASSWORD: analytics
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U analytics -d analytics"]
      interval: 5s
      timeout: 3s
      retries: 20

  keycloak-postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak -d keycloak"]
      interval: 5s
      timeout: 3s
      retries: 20

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    command: ["start-dev", "--import-realm"]
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL_HOST: keycloak-postgres
      KC_DB_URL_DATABASE: keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
    volumes:
      - ./realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    ports:
      - "8081:8080"
    depends_on:
      keycloak-postgres:
        condition: service_healthy

  analytics-service:
    build: .
    environment:
      DB_URL: jdbc:postgresql://analytics-postgres:5432/analytics
      DB_USER: analytics
      DB_PASSWORD: analytics
      KEYCLOAK_ISSUER_URI: http://keycloak:8080/realms/univerliga
      PROVISIONING_MODE: mock
      ANALYTICS_FEATURE_NETWORK: "false"
    ports:
      - "8080:8080"
    depends_on:
      analytics-postgres:
        condition: service_healthy
      keycloak:
        condition: service_started
