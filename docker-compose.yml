services:
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 5s
      timeout: 5s
      retries: 20

  analytics-postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: analytics
      POSTGRES_USER: analytics
      POSTGRES_PASSWORD: analytics
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U analytics -d analytics"]
      interval: 5s
      timeout: 3s
      retries: 20

  keycloak-postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak -d keycloak"]
      interval: 5s
      timeout: 3s
      retries: 20

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    command: ["start-dev", "--import-realm"]
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL_HOST: keycloak-postgres
      KC_DB_URL_DATABASE: keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
    volumes:
      - ./realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    ports:
      - "8081:8080"
    depends_on:
      keycloak-postgres:
        condition: service_healthy

  analytics-service:
    build: .
    environment:
      DB_URL: jdbc:postgresql://analytics-postgres:5432/analytics
      DB_USER: analytics
      DB_PASSWORD: analytics
      RABBIT_HOST: rabbitmq
      RABBIT_PORT: 5672
      RABBIT_USER: guest
      RABBIT_PASS: guest
      KEYCLOAK_ISSUER_URI: http://keycloak:8080/realms/univerliga
      PROVISIONING_MODE: readmodel
      ANALYTICS_FEATURE_NETWORK: "false"
      ANALYTICS_INGESTION_BROKER_ENABLED: "true"
      ANALYTICS_INGESTION_BROKER_EXCHANGE: univerliga.feedback.events
      ANALYTICS_INGESTION_BROKER_QUEUE: univerliga.analytics.feedback.inbox
      ANALYTICS_INGESTION_BROKER_DLQ: univerliga.analytics.feedback.dlq
      ANALYTICS_INGESTION_BROKER_ROUTING_KEYS: feedback.review.created,feedback.review.updated,feedback.review.deleted
    ports:
      - "8080:8080"
    depends_on:
      analytics-postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      keycloak:
        condition: service_started
